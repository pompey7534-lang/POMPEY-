<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - POMPEY</title>

    <link rel="stylesheet" href="css/style.css">

    <script type="module" src="js/signup.js"></script>
</head>

<body>

<div class="login-container">

    <h1>POMPEY</h1>

    <h2>Create Account</h2>

    <form id="signupForm">

        <input
        type="text"
        id="name"
        placeholder="Full Name"
        required>

        <input
        type="email"
        id="email"
        placeholder="Email Address"
        required>

        <input
        type="password"
        id="password"
        placeholder="Password"
        required>

        <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required>

        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <button id="googleSignup">
        Sign Up with Google
    </button>
    <button id="index.html">
        back to home 
    </button>

    <br><br>

    <p>
        Already have an account?
        <a href="login.html">
            Login
        </a>
    </p>

</div>

</body>
</html>
