<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | POMPEY</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0d6efd;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#084298;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<p>Enter your email address to receive a password reset link.</p>

<form id="resetForm">

<input
type="email"
id="email"
placeholder="Enter your email"
required>

<button type="submit">
Send Reset Link
</button>

</form>

<a href="login.html">← Back to Login</a>

</div>

<script type="module" src="js/forgot-password.js"></script>

</body>
</html>
