<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POMPEY Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#0d6efd;
color:#fff;
padding:18px;
font-size:24px;
text-align:center;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
text-align:center;
}

.card h2{
margin:0;
color:#0d6efd;
}

.card p{
font-size:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#0d6efd;
color:white;
}

select{
padding:8px;
}

</style>

</head>

<body>

<header>

POMPEY ADMIN DASHBOARD

</header>

<div class="cards">

<div class="card">
<h2>Total Orders</h2>
<p id="totalOrders">0</p>
</div>

<div class="card">
<h2>Total Sales</h2>
<p id="totalSales">₹0</p>
</div>

</div>

<table>

<thead>

<tr>

<th>Customer</th>

<th>Mobile</th>

<th>Total</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

<script type="module" src="admin-dashboard.js"></script>

</body>
</html>
