<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POMPEY Secure Checkout</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0d6efd;
color:#fff;
padding:18px;
font-size:28px;
font-weight:bold;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.container{
width:95%;
max-width:1200px;
margin:25px auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
margin-bottom:15px;
color:#0d6efd;
}

input,
textarea,
select{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;

}

textarea{
height:100px;
resize:none;
}

.order-item{

display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;

}

.summary p{

display:flex;
justify-content:space-between;
margin:10px 0;
font-size:17px;

}

.summary h3{

display:flex;
justify-content:space-between;
margin-top:20px;
font-size:24px;
color:#0d6efd;

}

button{

width:100%;
padding:15px;
margin-top:20px;
background:#28a745;
border:none;
border-radius:8px;
font-size:18px;
color:white;
cursor:pointer;

}

button:hover{

background:#218838;

}

@media(max-width:768px){

.container{

grid-template-columns:1fr;

}

}

</style>

<!-- EmailJS -->

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- Razorpay -->

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>
    </body>

<header>

POMPEY Secure Checkout

</header>

<div class="container">

<div class="card">

<h2>Delivery Address</h2>

<form id="checkoutForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<textarea id="address" placeholder="Complete Address" required></textarea>

<input type="text" id="city" placeholder="City" required>

<input type="text" id="state" placeholder="State" required>

<input type="text" id="pincode" placeholder="Pincode" required>

<h2>Payment Method</h2>

<select id="payment">

<option>Cash on Delivery</option>

<option>UPI (Razorpay)</option>

</select>

    <button type="submit">

Place Order

</button>

</form>

</div>

<div class="card">

<h2>Order Summary</h2>

<div id="summary"></div>

<hr><br>

<div class="summary">

<p>

<span>Products Total</span>

<span>₹<span id="subtotal">0</span></span>

</p>

<p>

<span>Delivery Charge</span>

<span>₹20</span>

</p>

<p>

<span>GST (2%)</span>

<span>₹<span id="gst">0</span></span>

</p>

<hr><br>

<h3>

<span>Grand Total</span>

<span>₹<span id="grandTotal">0</span></span>

</h3>

</div>

</div>

</div>
    
<script type="module">

import { db } from "./firebase-config.js";

import {
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// EmailJS
emailjs.init({
    publicKey:"tyImw1I225Ru0rAJT"
});

// Cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let subtotal = 0;

cart.forEach(item=>{
    subtotal += item.price * item.qty;
});

const deliveryCharge = 20;
const gst = subtotal * 0.02;
const grandTotal = subtotal + deliveryCharge + gst;

// Summary
document.getElementById("subtotal").textContent = subtotal.toFixed(2);
document.getElementById("gst").textContent = gst.toFixed(2);
document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);

const summary = document.getElementById("summary");

cart.forEach(item=>{

summary.innerHTML += `
<div class="order-item">
<span>${item.name} × ${item.qty}</span>
<span>₹${item.price * item.qty}</span>
</div>`;

});

// Checkout button
document.getElementById("checkoutForm").addEventListener("submit",function(e){

e.preventDefault();

const payment=document.getElementById("payment").value;

if(payment==="Cash on Delivery"){

saveOrder("Cash on Delivery");

}else{

const options={

key:"rzp_test_TBXDEp17mpy2hf",

amount:Math.round(grandTotal*100),

currency:"INR",

name:"POMPEY",

description:"Shopping Order",

handler:function(response){

saveOrder("Razorpay",response.razorpay_payment_id);

},

prefill:{

name:document.getElementById("name").value,

email:document.getElementById("email").value,

contact:document.getElementById("mobile").value

},

theme:{
color:"#0d6efd"
}

};

new Razorpay(options).open();

}

});
async function saveOrder(paymentMethod, paymentId=""){

try{

const orderData={

customerName:document.getElementById("name").value,
mobile:document.getElementById("mobile").value,
email:document.getElementById("email").value,

address:document.getElementById("address").value,
city:document.getElementById("city").value,
state:document.getElementById("state").value,
pincode:document.getElementById("pincode").value,

paymentMethod:paymentMethod,
paymentId:paymentId,

items:cart,

subtotal:subtotal,
deliveryCharge:deliveryCharge,
gst:gst,
total:grandTotal,

status:"Confirmed",

createdAt:serverTimestamp()

};

// Save to Firestore
const docRef=await addDoc(
collection(db,"orders"),
orderData
);

// Prepare product list
let orderItems="";

cart.forEach(item=>{

orderItems+=`${item.name} × ${item.qty} = ₹${item.price*item.qty}\n`;

});

// Send Email
await emailjs.send(

"service_90hoa3s",

"template_p7wcmzg",

{

order_id:docRef.id,

customer_name:orderData.customerName,

customer_phone:orderData.mobile,

customer_address:
orderData.address+", "+
orderData.city+", "+
orderData.state+" - "+
orderData.pincode,

order_items:orderItems,

order_total:grandTotal.toFixed(2),

payment_method:paymentMethod,

order_time:new Date().toLocaleString()

}

    
);

localStorage.removeItem("cart");

alert("✅ Order Placed Successfully!\n\nOrder ID: "+docRef.id);

window.location.href="orders.html";

}

catch(error){

console.error(error);

alert("Order Failed\n\n"+error.message);

}

    }
 </script>

</body>
</html>
