<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POMPEY Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
}

header{
background:#0d6efd;
color:#fff;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:1100px;
margin:25px auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
margin-bottom:15px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

textarea{
height:90px;
}

.order-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.summary p{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:17px;
}

.summary h3{
display:flex;
justify-content:space-between;
margin-top:15px;
color:#0d6efd;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#28a745;
color:white;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#218838;
}

@media(max-width:768px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h1>POMPEY Secure Checkout</h1>

</header>

<div class="container">

<div class="card">

<h2>Delivery Address</h2>

<form id="checkoutForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<textarea id="address" placeholder="Complete Address" required></textarea>

<input type="text" id="city" placeholder="City" required>

<input type="text" id="state" placeholder="State" required>

<input type="text" id="pincode" placeholder="Pincode" required>

<h2>Payment Method</h2>

<select id="payment">

<option>Cash on Delivery</option>

<option>UPI</option>

<option>Credit Card</option>

<option>Debit Card</option>

<option>Net Banking</option>

</select>

<button type="submit">

Place Order

</button>

</form>

</div>

<div class="card">

<h2>Order Summary</h2>

<div id="summary"></div>

<hr><br>

<div class="summary">

<p><span>Products Total</span><span>₹<span id="subtotal">0</span></span></p>

<p><span>Delivery Charge</span><span>₹20</span></p>

<p><span>GST (2%)</span><span>₹<span id="gst">0</span></span></p>

<hr><br>

<h3>

<span>Grand Total</span>

<span>₹<span id="grandTotal">0</span></span>

</h3>

</div>

</div>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let summary=document.getElementById("summary");

let subtotal=0;

cart.forEach(item=>{

let itemTotal=item.price*item.qty;

subtotal+=itemTotal;

summary.innerHTML+=`

<div class="order-item">

<span>${item.name} × ${item.qty}</span>

<span>₹${itemTotal}</span>

</div>

`;

});

const deliveryCharge=20;

const gst=subtotal*0.02;

const grandTotal=subtotal+deliveryCharge+gst;

document.getElementById("subtotal").innerHTML=subtotal.toFixed(2);

document.getElementById("gst").innerHTML=gst.toFixed(2);

document.getElementById("grandTotal").innerHTML=grandTotal.toFixed(2);

document.getElementById("checkoutForm").addEventListener("submit", function(e){
e.preventDefault();

const options = {
    key: "rzp_live_TBXDEp17mpy2hf",
    amount: Math.round(grandTotal * 100),
    currency: "INR",
    name: "POMPEY",
    description: "Order Payment",

    handler: function (response) {

        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        orders.push({
            paymentId: response.razorpay_payment_id,
            name: document.getElementById("name").value,
            mobile: document.getElementById("mobile").value,
            email: document.getElementById("email").value,
            address: document.getElementById("address").value,
            city: document.getElementById("city").value,
            state: document.getElementById("state").value,
            pincode: document.getElementById("pincode").value,
            payment: "Razorpay",
            items: cart,
            subtotal: subtotal,
            delivery: deliveryCharge,
            gst: gst,
            total: grandTotal,
            date: new Date().toLocaleString(),
            status: "Paid"
        });

        localStorage.setItem("orders", JSON.stringify(orders));
        localStorage.removeItem("cart");

        alert("Payment Successful!");

        window.location.href = "orders.html";
    },

    prefill: {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        contact: document.getElementById("mobile").value
    },

    theme: {
        color: "#0d6efd"
    }
};

var rzp = new Razorpay(options);
rzp.open();

});

</body>
  </html>
