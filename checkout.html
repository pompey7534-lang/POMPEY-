<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POMPEY Secure Checkout</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0d6efd;
color:#fff;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:95%;
max-width:1200px;
margin:20px auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.12);
}

input,
textarea,
select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:15px;
background:#28a745;
color:white;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.order-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.summary p,
.summary h3{
display:flex;
justify-content:space-between;
margin:10px 0;
}

@media(max-width:768px){

.container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>
POMPEY Secure Checkout
</header>

<div class="container">

<div class="card">

<h2>Delivery Address</h2>

<form id="checkoutForm">

<input id="name" placeholder="Full Name" required>

<input id="mobile" placeholder="Mobile Number" required>

<input id="email" type="email" placeholder="Email Address" required>

<textarea id="address" placeholder="Complete Address" required></textarea>

<input id="city" placeholder="City" required>

<input id="state" placeholder="State" required>

<input id="pincode" placeholder="Pincode" required>

<h2>Payment</h2>

<select id="payment">

<option>Cash on Delivery</option>

<option>UPI (Razorpay)</option>

</select>

<button type="submit">
Place Order
</button>

</form>

</div>

<div class="card">

<h2>Order Summary</h2>

<div id="summary"></div>

<hr>

<div class="summary">

<p>
<span>Subtotal</span>
<span>₹<span id="subtotal">0</span></span>
</p>

<p>
<span>Delivery</span>
<span>₹20</span>
</p>

<p>
<span>GST</span>
<span>₹<span id="gst">0</span></span>
</p>

<h3>
<span>Total</span>
<span>₹<span id="grandTotal">0</span></span>
</h3>

</div>

</div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAXvZ3pKpJReUhXPweOEFe09X6-ImhJwzs",

authDomain:"pompey-977ea.firebaseapp.com",

projectId:"pompey-977ea",

storageBucket:"pompey-977ea.firebasestorage.app",

messagingSenderId:"607741100294",

appId:"1:607741100294:web:3a221386c2155979681e87"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("checkoutForm").addEventListener("submit",function(e){

e.preventDefault();

const paymentMethod=document.getElementById("payment").value;

if(paymentMethod==="Cash on Delivery"){

saveOrder("Cash on Delivery");

return;

}

const options={

key:"rzp_test_TBXDEp17mpy2hf",

amount:Math.round(grandTotal*100),

currency:"INR",

name:"POMPEY",

description:"Shopping Order",

handler:function(response){

saveOrder("Razorpay", response.razorpay_payment_id);

},
prefill:{

name:document.getElementById("name").value,

email:document.getElementById("email").value,

contact:document.getElementById("mobile").value

}

};

const rzp=new Razorpay(options);

rzp.open();

});
async function saveOrder(payment,paymentId="rzp_test_TBXDEp17mpy2hf"){

const order={

paymentId,

payment,

name:document.getElementById("name").value,

mobile:document.getElementById("mobile").value,

email:document.getElementById("email").value,

address:document.getElementById("address").value,

city:document.getElementById("city").value,

state:document.getElementById("state").value,

pincode:document.getElementById("pincode").value,

items:cart,

subtotal,

delivery:deliveryCharge,

gst,

total:grandTotal,

status:"Pending",

createdAt:serverTimestamp()

};

try{

await addDoc(collection(db,"orders"),order);

localStorage.removeItem("cart");

alert("Order Placed Successfully!");

window.location.href="orders.html";

}catch(error){

alert(error.message);

}

}
    
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let subtotal = 0;

cart.forEach(item=>{
subtotal += item.price * item.qty;
});

const deliveryCharge = 20;

const gst = subtotal * 0.02;

let grandTotal = subtotal + deliveryCharge + gst;

document.getElementById("subtotal").innerHTML = subtotal.toFixed(2);

document.getElementById("gst").innerHTML = gst.toFixed(2);

document.getElementById("grandTotal").innerHTML = grandTotal.toFixed(2);

const summary = document.getElementById("summary");

cart.forEach(item=>{

summary.innerHTML += `
<div class="order-item">
<span>${item.name} × ${item.qty}</span>
<span>₹${item.price * item.qty}</span>
</div>
`;

}); 
  <script type="module">
</script>
</body>
</html>
