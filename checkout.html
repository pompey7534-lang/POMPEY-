<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POMPEY Checkout</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
max-width:1000px;
margin:20px auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.order-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:15px;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<header>
<h2>POMPEY Secure Checkout</h2>
</header>

<div class="container">

<div class="card">

<h2>Delivery Details</h2>

<form id="checkoutForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<textarea id="address" placeholder="Full Address" required></textarea>

<input type="text" id="city" placeholder="City" required>

<input type="text" id="state" placeholder="State" required>

<input type="text" id="pincode" placeholder="Pincode" required>

<h3>Payment Method</h3>

<select id="payment">
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Net Banking</option>
</select>

<button type="button" onclick="payNow()">
Pay Now
</button>
  
</form>

</div>

<div class="card">

<h2>Order Summary</h2>

<div id="summary"></div>

<div class="total">
Grand Total ₹<span id="grandTotal">0</span>
</div>

</div>

</div>


<script src="https://checkout.razorpay.com/v1/checkout.js">

<script>

let total = 500; // Replace this with your actual cart total

function payNow(){

const options = {

key:"YOUR_RAZORPAY_KEY_ID",

amount: total * 100,

currency:"INR",

name:"POMPEY",

description:"Order Payment",

handler:function(response){

alert("Payment Successful");

window.location.href="orders.html";

}

};

const rzp = new Razorpay(options);

rzp.open();

}

</script>
  
  
</script>
  
</body>
</html>
