<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>POMPEY - My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
}

header{
background:#0d6efd;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
width:95%;
max-width:1000px;
margin:30px auto;
}

.order{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.order h2{
color:#0d6efd;
margin-bottom:10px;
}

.row{
margin:8px 0;
}

.products{
margin-top:15px;
padding-top:15px;
border-top:1px solid #ddd;
}

.item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.status{
display:inline-block;
padding:8px 15px;
background:#28a745;
color:white;
border-radius:20px;
margin-top:15px;
}

.empty{
text-align:center;
padding:80px;
font-size:22px;
color:#777;
}

</style>

</head>

<body>

<header>

<h2>POMPEY Orders</h2>

<a href="dashboard.html">Dashboard</a>

</header>

<div class="container" id="ordersContainer">

</div>

<script>

const container=document.getElementById("ordersContainer");

let orders=JSON.parse(localStorage.getItem("orders"))||[];

if(orders.length===0){

container.innerHTML=`
<div class="empty">
📦<br><br>
No Orders Yet
</div>
`;

}else{

orders.reverse().forEach((order,index)=>{

let products="";

order.items.forEach(item=>{

products+=`

<div class="item">

<span>${item.name} × ${item.qty}</span>

<span>₹${item.price*item.qty}</span>

</div>

`;

});

container.innerHTML+=`

<div class="order">

<h2>Order #${orders.length-index}</h2>

<div class="row"><b>Name :</b> ${order.name}</div>

<div class="row"><b>Mobile :</b> ${order.mobile}</div>

<div class="row"><b>Email :</b> ${order.email}</div>

<div class="row"><b>Address :</b> ${order.address}</div>

<div class="row"><b>Payment :</b> ${order.payment}</div>

<div class="row"><b>Date :</b> ${order.date}</div>

<div class="products">

<h3>Ordered Products</h3>

${products}

</div>

<h3>Total : ₹${order.total}</h3>

<div class="status">

Order Confirmed ✅

</div>

</div>

`;

});

}

</script>

</body>
</html>
