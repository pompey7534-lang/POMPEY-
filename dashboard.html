<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POMPEY Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:#0d6efd;
            color:white;
            padding:15px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:30px auto;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#dc3545;
            color:white;
            cursor:pointer;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-top:25px;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 5px 10px rgba(0,0,0,.1);
        }

        .box h3{
            color:#0d6efd;
        }
    </style>
</head>

<body>

<header>

<h2>POMPEY Dashboard</h2>

<button id="logoutBtn">
Logout
</button>

</header>

<div class="container">

<div class="card">

<h2>Welcome</h2>

<p id="userEmail">
Loading...
</p>

</div>

<div class="grid">

<div class="box" onclick="window.location.href='profile.html'" style="cursor:pointer;">
    <h3>Profile</h3>
    <p>Manage your account</p>
</div>
 
<div class="box">
<h3>Products</h3>
<p>Browse grocery products</p>
<a href="Grocery.html" class="box">Products</a>  
</div>

<div class="box">
<h3>Cart</h3>
<p>Your shopping cart</p>
<a href="cart.html" class="box">Cart</a>
</div>

<div class="box">
<h3>Orders</h3>
<p>View your orders</p>
<a href="orders.html" class="box">Orders</a>
</div>

<div class="box">
<h3>Profile</h3>
<p>Manage your account</p>
<a href="profile.html" class="box">Profile</a>
</div>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
